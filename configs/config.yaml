learning_rate: 0.015
epochs: 50
batch_size: 32768
train_split: 0.8
test_split: 0.2
seed: 42
run_test: false
save_interval: 5

model: "GATv2" # GAT/GATv2/GraphTransformer/SAGE
embedding_dim: 512
hidden_dim: 768
dnabert_proj_dim: 128
heads: 4
dropout_p: 0.4
edge_dropout_p: 0.2
num_layers: 2

focal_loss_alpha: 1.0
focal_loss_gamma: 2.0
use_focal_loss: true

gpu_ids: "all" #list of gpu ids to use, "all" to use all available gpus

checkpoint_dir: "./checkpoints"
project_name: "te-classification-gatv2-mus3novo"

species: "mouse"  # mouse/dog/dro
k_mers: 3         # 0/3/4/5 
fam_type: "Novo"  # "Novo"/""
features_subset: "all" #none/original/structural/alg/kmer_counts/dnabert/all
partition: "families" #random/families/two_graphs
test_species: "dog"
test_k_mers: 3
test_fam_type: "Novo"

recreate_dataset: False
run_hpo: False
n_trials: 100
