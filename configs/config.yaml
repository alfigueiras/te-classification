learning_rate: 0.00018055533400386734
epochs: 75
batch_size: 32768
train_split: 0.8
test_split: 0.2
seed: 42
run_test: false
save_interval: 25
early_stop_patience: 10
early_stop_min_delta: 0

model: "GIN" # GAT/GATv2/GraphTransformer/SAGE/GIN
embedding_dim: 1024
hidden_dim: 1024
dnabert_proj_dim: 128
heads: 2
dropout_p: 0.10102440968648803
edge_dropout_p: 0.36901254234533354
num_layers: 3

focal_loss_alpha: 0.32066446519526715
focal_loss_gamma: 1.7572195079205661
use_focal_loss: true

gpu_ids: [0,3]  #list of gpu ids to use, "all" to use all available gpus

checkpoint_dir: "./checkpoints"
project_name: "entropy-feature"

species: "dro"  # mouse/dog/dro
k_mers: 3         # 0/3/4/5 
fam_type: "Novo"  # "Novo"/""
features_subset: "all" #none/original/structural/alg/k_mer_counts/dnabert/all_less_alg/all_less_struct/all_less_original/all
partition: "families" #random/families/two_graphs
test_species: "mouse" # mouse/dog/dro
test_k_mers: 3 # 0/3/4/5 
test_fam_type: "Novo" # "Novo"/""

recreate_dataset: True
dnabert_recompute: False
use_hpo: False
experiment_mode: "basic" # "basic"/"features_subsets"
n_trials: 50
